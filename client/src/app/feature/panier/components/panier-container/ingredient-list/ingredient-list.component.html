<ul class="list-none border border-gray-300 rounded-md">
  <li
    *ngFor="let ingredient of ingredients; let i = index"
    class="flex justify-between items-center py-2 px-4 border-b border-gray-300"
  >
    <span class="flex-grow">{{ ingredient.name }}</span>
    <span class="badge bg-blue-500 text-white px-2 py-1 rounded">{{
      ingredient.quantity
    }}</span>
  </li>
</ul>
