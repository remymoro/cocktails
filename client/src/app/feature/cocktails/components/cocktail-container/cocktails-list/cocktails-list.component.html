<div class="w-full p-4">
  <h3 class="mb-6 text-2xl font-semibold">Liste des cocktails</h3>
  <input
    class="mb-6 w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
    type="text"
    placeholder="Rechercher un cocktail"
    [(ngModel)]="search"
  />
  <ul *ngIf="cocktails" class="mb-6 list-none">
    <li
      *ngFor="let cocktail of cocktails | filter : search; let index = index"
      [routerLink]="[index]"
      routerLinkActive="active"
      class="py-2 px-4 border-b border-gray-300 hover:bg-gray-100 cursor-pointer"
    >
      {{ cocktail.name }}
    </li>
  </ul>
  <button
    routerLink="new"
    class="btn bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
  >
    Ajouter un cocktail
  </button>
</div>
