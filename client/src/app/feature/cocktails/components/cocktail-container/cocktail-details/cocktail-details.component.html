<div
  *ngIf="cocktail"
  class="w-full shadow-lg rounded-lg overflow-hidden bg-white"
>
  <div class="w-full h-64 overflow-hidden">
    <img
      class="w-full h-full object-cover"
      [src]="cocktail.img"
      [alt]="cocktail.name"
    />
  </div>
  <div class="p-4">
    <h3 class="mb-4 text-xl font-semibold">{{ cocktail.name }}</h3>
    <p class="mb-4 text-gray-700">{{ cocktail.description }}</p>
    <ul class="list-primary mb-4">
      <li
        *ngFor="let ingredient of cocktail.ingredients; let i = index"
        class="flex justify-between items-center py-2 px-4 border-b border-gray-300"
      >
        <span class="flex-grow">{{ ingredient.name }}</span>
        <span class="badge bg-blue-500 text-white px-2 py-1 rounded">{{
          ingredient.quantity
        }}</span>
      </li>
    </ul>
    <div class="flex justify-between">
      <button
        routerLink="edit"
        class="btn bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        Editer le cocktail
      </button>
      <button
        class="btn bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
        (click)="addToPanier()"
      >
        Ajouter au panier
      </button>
    </div>
  </div>
</div>
